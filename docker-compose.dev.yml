# =============================================================================
# DEVELOPMENT Docker Compose for Awake Coffee Backend
# Usage:
#   1. Copy .env.docker.example to .env.docker
#   2. docker compose -f docker-compose.dev.yml up -d
#   3. docker compose -f docker-compose.dev.yml exec app composer install
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PHP-FPM Application (Laravel API)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: api-app-dev
    container_name: api-app-dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - api-network
    depends_on:
      - database

  # ---------------------------------------------------------------------------
  # Nginx Web Server (Laravel API)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: api-nginx-dev
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html:cached
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf
    networks:
      - api-network
    depends_on:
      - app

  # ---------------------------------------------------------------------------
  # MySQL Database
  # ---------------------------------------------------------------------------
  database:
    image: mysql:8.0
    container_name: api-database
    restart: unless-stopped
    ports:
      - "3307:3306"
    env_file:
      - .env.docker
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-db_api}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
      MYSQL_USER: ${MYSQL_USER:-laravel}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - api-dbdata:/var/lib/mysql
    networks:
      - api-network

networks:
  api-network:
    driver: bridge

volumes:
  api-dbdata:
    driver: local
