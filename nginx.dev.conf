# =============================================================================
# DEVELOPMENT Nginx Configuration for Awake Coffee Backend
# Serves Laravel API - Flutter app connects via HTTP
# =============================================================================

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 100M;

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # -------------------------------------------------------------------------
    # CORS Headers for Development
    # Allows Flutter app to access API
    # -------------------------------------------------------------------------
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, X-XSRF-TOKEN, Accept" always;
    add_header Access-Control-Allow-Credentials true always;

    # Handle preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # -------------------------------------------------------------------------
    # Laravel Routes (all requests go to Laravel)
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # -------------------------------------------------------------------------
    # Storage Files (for uploaded images)
    # -------------------------------------------------------------------------
    location /storage {
        alias /var/www/html/storage/app/public;
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # PHP-FPM Handler
    # -------------------------------------------------------------------------
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # -------------------------------------------------------------------------
    # Security
    # -------------------------------------------------------------------------
    location ~ /\.ht {
        deny all;
    }

    location ~ /\.git {
        deny all;
    }
}
